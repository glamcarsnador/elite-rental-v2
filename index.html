<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE CAR V8.1 - ATOMIC PRECISION</title>
    <style>
        :root { 
            --primary: #2c3e50; --orange: #e67e22; --green: #2ecc71; 
            --red: #ffcdd2; --dark-red: #b71c1c; --blue: #3498db; --light-orange: #fff4e6;
            --border-color: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #000; overflow-x: hidden; }

        /* HEADER */
        .header-section { background: white; padding: 15px; border-bottom: 3px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .logo-row { text-align: center; margin-bottom: 10px; }
        .main-logo { height: 80px; width: auto; transition: 0.3s; }
        @media (min-width: 768px) { .main-logo { height: 130px; } }

        .status-row { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; flex-wrap: wrap; padding: 10px; background: #fdfdfd; 
            border: 1px solid #eee; border-radius: 8px;
        }

        .clock-display {
            background: white; color: #333; padding: 5px 15px; border-radius: 8px;
            font-weight: bold; border: 2px solid #eee; text-align: center; min-width: 160px;
        }
        
        /* TABLES */
        .table-wrapper { padding: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; background: white; min-width: 3200px; border: 3px solid var(--border-color); }
        th { background: var(--primary); color: white; padding: 12px; border: 1px solid #fff; text-transform: uppercase; font-size: 13px; position: sticky; top: 0; }
        td { border: 1px solid var(--border-color); padding: 2px; text-align: center; height: 50px; font-size: 16px; font-weight: 700; }
        
        input, select { border: none; padding: 10px 2px; width: 100%; box-sizing: border-box; font-size: 16px; font-weight: 700; outline: none; background: transparent; text-align: center; color: inherit; }

        /* COLOR ENGINE */
        .row-overdue { background-color: var(--red) !important; color: var(--dark-red) !important; } 
        .row-reserved { background-color: #b3e5fc !important; } 
        .row-partial { background-color: #fff9c4 !important; }  
        .row-active { background-color: #c8e6c9 !important; }   
        .col-orange { background-color: var(--light-orange) !important; }

        /* BUTTONS */
        .btn-up { background: var(--blue); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-finish { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-reset { cursor: pointer; font-size: 18px; margin-left: 5px; color: var(--blue); background: none; border: none; vertical-align: middle; }

        /* SEARCH CONSOLE */
        .console { background: #2c3e50; color: white; padding: 30px 15px; text-align: center; }
        .search-grid { display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center; }
        @media (min-width: 768px) { .search-grid { flex-direction: row; gap: 20px; } }
        .search-box { background: white; padding: 10px; border-radius: 8px; color: black; display: flex; gap: 10px; align-items: center; min-width: 250px; }
        .btn-search { background: var(--blue); color: white; border: none; padding: 12px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* OVERLAY */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid var(--orange); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner"></div>
    <h3 style="color: var(--primary); margin-top: 15px;">SYNCING ELITE V8.1...</h3>
</div>

<div class="header-section">
    <div class="logo-row"><img src="logo.jpg" alt="ELITE" class="main-logo"></div>
    <div class="status-row">
        <div class="clock-display">
            <div id="live-date">00/00/00</div>
            <div id="live-clock" style="color: var(--orange); font-size: 20px;">00:00:00</div>
        </div>
        <div id="sync-status" style="font-weight: 900; color: #2ecc71;">● LIVE</div>
    </div>
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>CAR</th><th>MATRICULE</th><th>CLIENT NAME</th><th>PHONE</th><th>ID CARD N°</th><th>DRIVING LICENCE</th><th>DOCS</th>
                <th>DATE OUT</th><th>TIME OUT</th><th>DATE IN</th><th>EXT. DATE IN</th><th>TIME IN</th><th>DAYS</th><th>DAY PRICE</th>
                <th>TOTAL</th><th>ADVANCE</th><th>REMAINING</th><th>STATE</th><th>RANKING</th><th>NOTES</th><th>ACTIONS</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="console">
    <div class="search-grid">
        <div class="search-box">
            <input type="text" id="uSearch" placeholder="NAME, PHONE, CAR..." style="text-align:left; padding-left:10px;">
        </div>
        <div class="search-box">
            <span style="font-size:11px; color:gray;">FROM</span>
            <input type="date" id="dateStart">
            <span style="font-size:11px; color:gray;">TO</span>
            <input type="date" id="dateEnd">
        </div>
        <button class="btn-search" onclick="runHistorySearch()">SEARCH HISTORY</button>
    </div>
    <div class="table-wrapper" style="margin-top:20px; background:transparent;">
        <table id="historyTable" style="background:white; color:black;">
            <tbody id="resBody"></tbody>
        </table>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1ZS3ZwZ7xPEa1Cp43wW2fmhwmWI9tPmfWGnWlQ_mp6njC2ugSlyG02vz_S5QvhVgxzA/exec"; 
    let currentData = [];
    let officialTime = new Date();

    async function init() {
        try {
            const [tRes, dRes] = await Promise.all([
                fetch('https://worldtimeapi.org/api/timezone/Africa/Casablanca').then(r => r.json()).catch(() => null),
                fetch(SCRIPT_URL).then(r => r.json())
            ]);
            if(tRes) officialTime = new Date(tRes.datetime);
            currentData = dRes;
            renderTable();
            document.getElementById('overlay').style.display = 'none';
            
            setInterval(() => {
                officialTime.setSeconds(officialTime.getSeconds() + 1);
                document.getElementById('live-date').innerText = toEliteDate(officialTime);
                document.getElementById('live-clock').innerText = officialTime.toLocaleTimeString('fr-FR');
                processOverdue();
            }, 1000);
        } catch(e) { alert("Sync Error. Check Script URL."); }
    }

    // --- DATE/TIME TRANSLATORS ---
    function toEliteDate(d) {
        if(!d || isNaN(d)) return "";
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
    }

    function fromEliteDate(s) {
        if(!s || s.length < 8) return null;
        const [d, m, y] = s.split('/').map(Number);
        return new Date(2000+y, m-1, d);
    }

    // --- TABLE RENDER ---
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        for (let i = 1; i < currentData.length; i++) {
            const row = currentData[i];
            const tr = document.createElement('tr');
            tr.id = `row-${i}`;
            tr.innerHTML = `
                <td class="col-orange"><input value="${row[0]||''}" onchange="upd(${i},0,this.value)"></td>
                <td class="col-orange"><input value="${row[1]||''}" onchange="upd(${i},1,this.value)"></td>
                <td><input value="${row[2]||''}" onchange="upd(${i},2,this.value)"></td>
                <td><input value="${row[3]||''}" onchange="upd(${i},3,this.value)"></td>
                <td><input value="${row[4]||''}" onchange="upd(${i},4,this.value)"></td>
                <td><input value="${row[5]||''}" onchange="upd(${i},5,this.value)"></td>
                <td>
                    <button class="btn-up" onclick="document.getElementById('up-${i}').click()">UPLOAD</button>
                    <input type="file" id="up-${i}" hidden onchange="handleUpload(${i}, this)">
                    ${row[6] ? `<a href="${row[6]}" target="_blank" style="font-size:20px;">📄</a>` : ''}
                </td>
                <td><input type="date" value="${isoDate(row[7])}" onchange="dateToElite(${i},7,this.value)"></td>
                <td><input type="time" value="${row[8]||''}" onchange="upd(${i},8,this.value)"></td>
                <td><input type="date" value="${isoDate(row[9])}" onchange="dateToElite(${i},9,this.value)"></td>
                <td><input type="date" value="${isoDate(row[10])}" onchange="dateToElite(${i},10,this.value)"></td>
                <td><input type="time" value="${row[11]||''}" onchange="upd(${i},11,this.value)"></td>
                <td><input value="${row[12]||''}" readonly></td>
                <td><input type="number" value="${row[13]||''}" onchange="upd(${i},13,this.value); math(${i})"></td>
                <td><input value="${row[14]||''}" readonly></td>
                <td><input type="number" value="${row[15]||''}" onchange="upd(${i},15,this.value); math(${i})"></td>
                <td><input type="number" value="${row[16]||''}" onchange="upd(${i},16,this.value)"> <button class="btn-reset" onclick="resetRem(${i})">🔄</button></td>
                <td>
                    <select onchange="upd(${i},17,this.value)">
                        <option value="" ${row[17]==''?'selected':''}>-</option>
                        <option value="ACTIVE/PAID" ${row[17]=='ACTIVE/PAID'?'selected':''}>ACTIVE/PAID</option>
                        <option value="RESERVED" ${row[17]=='RESERVED'?'selected':''}>RESERVED</option>
                        <option value="PARTIAL" ${row[17]=='PARTIAL'?'selected':''}>PARTIAL</option>
                    </select>
                </td>
                <td><input type="number" value="${row[18]||''}" onchange="upd(${i},18,this.value)"></td>
                <td><input value="${row[19]||''}" onchange="upd(${i},19,this.value)"></td>
                <td><button class="btn-finish" onclick="archive(${i})">FINISH</button></td>
            `;
            tbody.appendChild(tr);
        }
    }

    // --- LOGIC GATES ---
    function isoDate(eliteStr) {
        if(!eliteStr) return "";
        const d = fromEliteDate(eliteStr);
        return d ? d.toISOString().split('T')[0] : "";
    }

    function dateToElite(r, c, val) {
        if(!val) { currentData[r][c] = ""; }
        else {
            const d = new Date(val);
            currentData[r][c] = toEliteDate(d);
        }
        if(c >= 7 && c <= 10) calcDays(r);
        sync();
    }

    function calcDays(i) {
        const start = fromEliteDate(currentData[i][7]);
        const end = fromEliteDate(currentData[i][10] || currentData[i][9]);
        if(start && end) {
            let diff = Math.floor((end - start) / 86400000);
            currentData[i][12] = diff <= 0 ? 1 : diff;
            math(i);
        }
    }

    function math(i) {
        const d = parseFloat(currentData[i][12]) || 0;
        const p = parseFloat(currentData[i][13]) || 0;
        const a = parseFloat(currentData[i][15]) || 0;
        currentData[i][14] = d * p;
        currentData[i][16] = (d * p) - a;
        renderTable(); 
        sync();
    }

    function resetRem(i) {
        currentData[i][16] = (parseFloat(currentData[i][14]) || 0) - (parseFloat(currentData[i][15]) || 0);
        renderTable(); sync();
    }

    function processOverdue() {
        for (let i = 1; i < currentData.length; i++) {
            const tr = document.getElementById(`row-${i}`);
            if(!tr) continue;
            let cls = "";
            const row = currentData[i];
            const end = fromEliteDate(row[10] || row[9]);
            if(end && row[2]) {
                const [h, m] = (row[11] || "00:00").split(':').map(Number);
                end.setHours(h, m);
                if(end < officialTime) cls = "row-overdue";
            }
            if(!cls) {
                if(row[17] === "RESERVED") cls = "row-reserved";
                else if(row[17] === "PARTIAL") cls = "row-partial";
                else if(row[17] === "ACTIVE/PAID") cls = "row-active";
            }
            if(tr.className !== cls) tr.className = cls;
        }
    }

    async function handleUpload(i, input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "upload", row: i, filename: file.name, mimeType: file.type, base64: base64 })});
            currentData[i][6] = await res.text();
            renderTable();
        };
        reader.readAsDataURL(file);
    }

    function upd(r, c, v) { currentData[r][c] = v; sync(); }
    async function sync() { await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "saveAll", data: currentData }) }); }

    async function runHistorySearch() {
        const q = document.getElementById('uSearch').value.toLowerCase();
        const sD = document.getElementById('dateStart').value ? new Date(document.getElementById('dateStart').value) : null;
        const eD = document.getElementById('dateEnd').value ? new Date(document.getElementById('dateEnd').value) : null;
        
        const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getHistory" }) });
        const h = await res.json();
        const filtered = h.filter((r, idx) => {
            if(idx === 0) return false;
            const textMatch = q === "" || r.some(c => String(c).toLowerCase().includes(q));
            const rOut = fromEliteDate(r[7]);
            const rIn = fromEliteDate(r[10]||r[9]);
            let dateMatch = true;
            if(sD && eD && rOut && rIn) dateMatch = (rOut <= eD && rIn >= sD);
            return textMatch && dateMatch;
        });

        document.getElementById('resBody').innerHTML = filtered.map(r => `
            <tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]?'<a href="'+r[6]+'" target="_blank">📄</a>':''}</td><td>${r[7]}</td><td>${r[8]}</td><td>${r[9]}</td><td>${r[10]}</td><td>${r[11]}</td><td>${r[12]}</td><td>${r[13]}</td><td>${r[14]}</td><td>${r[15]}</td><td>${r[16]}</td><td>${r[17]}</td><td>${r[18]}</td><td>${r[19]}</td><td>${r[20]||''}</td></tr>
        `).join('');
    }

    async function archive(i) {
        if(confirm("ARCHIVE?")) {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "archive", row: i, data: currentData[i], officialTime: officialTime.toISOString() })});
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
