<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE CAR V10 - ALL-IN-ONE</title>
    <style>
        :root { 
            --primary: #2c3e50; --orange: #e67e22; --green: #2ecc71; 
            --red: #ffcdd2; --dark-red: #b71c1c; --blue: #3498db; --light-orange: #fff4e6;
            --border-color: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #000; overflow-x: hidden; }

        /* NAVIGATION BAR */
        .nav-bar { background: var(--primary); display: flex; justify-content: center; gap: 20px; padding: 10px; position: sticky; top: 0; z-index: 1001; }
        .nav-btn { background: transparent; color: white; border: 2px solid white; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { background: var(--orange); border-color: var(--orange); }

        /* HEADER & STATUS */
        .header-section { background: white; padding: 15px; border-bottom: 3px solid #ddd; text-align: center; }
        .main-logo { height: 80px; width: auto; }
        .status-row { display: flex; align-items: center; justify-content: center; gap: 15px; padding: 10px; }
        .clock-display { background: white; border: 2px solid #eee; padding: 5px 15px; border-radius: 8px; font-weight: bold; }
        
        #sync-text { font-weight: 900; font-size: 18px; }
        .status-pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* SECTIONS */
        .page-section { display: none; padding: 10px; }
        .page-section.active { display: block; }

        /* TABLES */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; background: white; border: 2px solid var(--border-color); }
        table { border-collapse: collapse; min-width: 100%; width: max-content; }
        th { background: var(--primary); color: white; padding: 12px; border: 1px solid #fff; text-transform: uppercase; font-size: 13px; position: sticky; top: 0; }
        td { border: 1px solid var(--border-color); padding: 2px; text-align: center; height: 50px; font-size: 16px; font-weight: 700; }
        input, select { border: none; width: 100%; box-sizing: border-box; font-size: 16px; font-weight: 700; outline: none; background: transparent; text-align: center; padding: 10px 2px; }

        /* INCOME SPECIFIC */
        .income-header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; border: 2px solid var(--primary); }
        .total-box { background: var(--green); color: white; padding: 20px; border-radius: 8px; font-size: 24px; font-weight: bold; margin-top: 20px; }

        /* ROW COLORS */
        .row-overdue { background-color: var(--red) !important; color: var(--dark-red) !important; } 
        .row-reserved { background-color: #b3e5fc !important; } 
        .row-partial { background-color: #fff9c4 !important; }  
        .row-active { background-color: #c8e6c9 !important; }   
        .col-orange { background-color: var(--light-orange) !important; }

        .btn-up { background: var(--blue); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-finish { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body onbeforeunload="return handleExit()">

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showPage('active-page', this)">ACTIVE CARS</button>
    <button class="nav-btn" onclick="showPage('income-page', this)">MONTHLY INCOME</button>
    <button class="nav-btn" onclick="showPage('history-page', this)">HISTORY SEARCH</button>
</nav>

<div class="header-section">
    <img src="logo.jpg" alt="ELITE" class="main-logo">
    <div class="status-row">
        <div class="clock-display">
            <div id="live-date">--/--/--</div>
            <div id="live-clock" style="color: var(--orange); font-size: 20px;">00:00:00</div>
        </div>
        <div><span id="sync-dot">●</span> <span id="sync-text">LIVE</span></div>
    </div>
</div>

<div id="active-page" class="page-section active">
    <div class="table-wrapper">
        <table style="min-width: 2500px;">
            <thead>
                <tr>
                    <th>CAR</th><th>MATRICULE</th><th>CLIENT</th><th>PHONE</th><th>ID CARD</th><th>LICENCE</th><th>DOCS</th>
                    <th>OUT</th><th>TIME</th><th>IN</th><th>EXT</th><th>TIME</th><th>DAYS</th><th>PRICE</th>
                    <th>TOTAL</th><th>ADV</th><th>REM</th><th>STATE</th><th>RANK</th><th>NOTES</th><th>ACTION</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="income-page" class="page-section">
    <div class="income-header">
        <h2>REVENUE TRACKER</h2>
        <select id="monthSelect" onchange="runIncomeReport()" style="max-width: 300px; border: 2px solid #ccc;">
            <option value="January">January</option><option value="February">February</option>
            <option value="March" selected>March</option><option value="April">April</option>
            <option value="May">May</option><option value="June">June</option>
            <option value="July">July</option><option value="August">August</option>
            <option value="September">September</option><option value="October">October</option>
            <option value="November">November</option><option value="December">December</option>
        </select>
        <div id="income-status" style="margin-top:10px; font-weight:bold;"></div>
        <div class="table-wrapper" style="margin-top:20px;">
            <table style="min-width: 100%;">
                <thead>
                    <tr><th>CAR</th><th>DATE OUT</th><th>DATE IN</th><th>DAYS IN MONTH</th><th>MONTHLY INCOME</th></tr>
                </thead>
                <tbody id="incomeBody"></tbody>
            </table>
        </div>
        <div class="total-box" id="totalIncomeDisplay">TOTAL: 0 DH</div>
    </div>
</div>

<div id="history-page" class="page-section">
    <div style="background:#2c3e50; color:white; padding:20px; border-radius:10px;">
        <input type="text" id="uSearch" placeholder="SEARCH NAME, PHONE, CAR..." style="background:white; color:black; margin-bottom:10px;">
        <button class="nav-btn" style="width:100%" onclick="runHistorySearch()">RUN SEARCH</button>
    </div>
    <div class="table-wrapper" style="margin-top:20px;">
        <table id="historyTable" style="min-width: 2500px;">
            <thead>
                <tr>
                    <th>CAR</th><th>MATRICULE</th><th>CLIENT</th><th>PHONE</th><th>ID</th><th>LICENCE</th><th>DOCS</th>
                    <th>OUT</th><th>TIME</th><th>IN</th><th>EXT</th><th>TIME</th><th>DAYS</th><th>PRICE</th>
                    <th>TOTAL</th><th>ADV</th><th>REM</th><th>STATE</th><th>RANK</th><th>NOTES</th><th>ARCHIVED</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjKjJMYowIY60K4IMkKC5l4LcopnR41ArViZS2U9NV1JBjYCp6hhloAAQtAWIpP7wx2w/exec"; 
    let currentData = [];
    let officialTime = new Date();
    let isSaving = false;

    function showPage(pageId, btn) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
        if(pageId === 'income-page') runIncomeReport();
    }

    async function init() {
        try {
            const res = await fetch(SCRIPT_URL);
            currentData = await res.json();
            renderTable();
        } catch(e) { updateStatus("OFFLINE", "#e74c3c"); }

        setInterval(() => {
            officialTime.setSeconds(officialTime.getSeconds() + 1);
            document.getElementById('live-date').innerText = formatEliteDate(officialTime);
            document.getElementById('live-clock').innerText = officialTime.toLocaleTimeString('fr-FR', {hour12: false});
            processRowColors();
        }, 1000);
    }

    function formatEliteDate(d) {
        if(!d || isNaN(d)) return "";
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
    }

    function parseEliteDate(s) {
        if(!s || s.length < 5) return null;
        const parts = String(s).split('/');
        const day = parseInt(parts[0]);
        const month = parseInt(parts[1]) - 1;
        const year = parts[2].length === 2 ? 2000 + parseInt(parts[2]) : parseInt(parts[2]);
        return new Date(year, month, day);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        for (let i = 1; i < currentData.length; i++) {
            const row = currentData[i];
            const tr = document.createElement('tr');
            tr.id = `row-${i}`;
            tr.innerHTML = `
                <td class="col-orange"><input value="${row[0]||''}" onchange="upd(${i},0,this.value)"></td>
                <td class="col-orange"><input value="${row[1]||''}" onchange="upd(${i},1,this.value)"></td>
                <td><input value="${row[2]||''}" onchange="upd(${i},2,this.value)"></td>
                <td><input value="${row[3]||''}" onchange="upd(${i},3,this.value)"></td>
                <td><input value="${row[4]||''}" onchange="upd(${i},4,this.value)"></td>
                <td><input value="${row[5]||''}" onchange="upd(${i},5,this.value)"></td>
                <td>${row[6] ? `<a href="${row[6]}" target="_blank" style="font-size:20px;">📄</a>` : ''}</td>
                <td><input value="${row[7]||''}" onchange="upd(${i},7,this.value)"></td>
                <td><input value="${row[8]||''}" onchange="upd(${i},8,this.value)"></td>
                <td><input value="${row[9]||''}" onchange="upd(${i},9,this.value)"></td>
                <td><input value="${row[10]||''}" onchange="upd(${i},10,this.value)"></td>
                <td><input value="${row[11]||''}" onchange="upd(${i},11,this.value)"></td>
                <td><input value="${row[12]||''}" onchange="upd(${i},12,this.value)"></td>
                <td><input value="${row[13]||''}" onchange="upd(${i},13,this.value)"></td>
                <td><input value="${row[14]||''}" onchange="upd(${i},14,this.value)"></td>
                <td><input value="${row[15]||''}" onchange="upd(${i},15,this.value)"></td>
                <td><input value="${row[16]||''}" onchange="upd(${i},16,this.value)"></td>
                <td><select onchange="upd(${i},17,this.value)"><option value="ACTIVE/PAID" ${row[17]=='ACTIVE/PAID'?'selected':''}>ACTIVE/PAID</option><option value="RESERVED" ${row[17]=='RESERVED'?'selected':''}>RESERVED</option><option value="PARTIAL" ${row[17]=='PARTIAL'?'selected':''}>PARTIAL</option></select></td>
                <td><input value="${row[18]||''}" onchange="upd(${i},18,this.value)"></td>
                <td><input value="${row[19]||''}" onchange="upd(${i},19,this.value)"></td>
                <td><button class="btn-finish" onclick="archiveRow(${i})">FINISH</button></td>
            `;
            tbody.appendChild(tr);
        }
    }

    async function runIncomeReport() {
        const monthName = document.getElementById('monthSelect').value;
        const status = document.getElementById('income-status');
        status.innerText = "CALCULATING...";
        
        const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getMonthlyReport", month: monthName }) });
        const report = await res.json();
        
        let total = 0;
        document.getElementById('incomeBody').innerHTML = report.map(r => {
            total += r.income;
            return `<tr><td>${r.brand} ${r.model}</td><td>${r.out}</td><td>${r.in}</td><td>${r.daysInMonth}</td><td>${r.income} DH</td></tr>`;
        }).join('');
        
        document.getElementById('totalIncomeDisplay').innerText = `TOTAL: ${total.toLocaleString()} DH`;
        status.innerText = `FOUND ${report.length} ENTRIES`;
    }

    async function runHistorySearch() {
        const q = document.getElementById('uSearch').value.toLowerCase();
        const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getHistory" }) });
        const history = await res.json();
        const filtered = history.slice(1).filter(r => r.some(c => String(c).toLowerCase().includes(q)));
        
        document.getElementById('resBody').innerHTML = filtered.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
    }

    function upd(r, c, v) { currentData[r][c] = v; sync(); }
    async function sync() {
        isSaving = true; updateStatus("SAVING...", "#f39c12");
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "saveAll", data: currentData }) });
        updateStatus("LIVE", "#2ecc71"); isSaving = false;
    }

    function processRowColors() { /* Original logic */ }
    function updateStatus(t, c) { 
        document.getElementById('sync-text').innerText = t; 
        document.getElementById('sync-text').style.color = c; 
    }
    function handleExit() { if (isSaving) return "Saving data..."; }
    
    init();
</script>
</body>
</html>
