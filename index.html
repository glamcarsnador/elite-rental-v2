<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE CAR V8.0 - PRO EDITION</title>
    <style>
        :root { 
            --primary: #2c3e50; --orange: #e67e22; --green: #2ecc71; 
            --red: #ffcdd2; --dark-red: #b71c1c; --blue: #3498db; --light-orange: #fff4e6;
            --border-color: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #000; overflow-x: hidden; }

        /* HEADER & ATOMIC CLOCK */
        .header-section { background: white; padding: 15px; border-bottom: 3px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .logo-row { text-align: center; margin-bottom: 10px; }
        .main-logo { height: 80px; width: auto; transition: 0.3s; }
        @media (min-width: 768px) { .main-logo { height: 140px; } }

        .status-row { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; flex-wrap: wrap; padding: 10px; background: #fdfdfd; 
            border: 1px solid #eee; border-radius: 8px; font-size: 12px;
        }

        .clock-display {
            background: white; color: #333; padding: 5px 15px; border-radius: 8px;
            font-weight: bold; border: 2px solid #eee; text-align: center; min-width: 160px;
        }
        
        /* TABLES */
        .table-wrapper { padding: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; background: white; min-width: 3200px; border: 3px solid var(--border-color); }
        th { background: var(--primary); color: white; padding: 12px; border: 1px solid #fff; text-transform: uppercase; font-size: 13px; position: sticky; top: 0; }
        td { border: 1px solid var(--border-color); padding: 2px; text-align: center; height: 50px; font-size: 16px; font-weight: 700; }
        
        input, select { border: none; padding: 10px 2px; width: 100%; box-sizing: border-box; font-size: 16px; font-weight: 700; outline: none; background: transparent; text-align: center; color: inherit; }
        input[readonly] { cursor: default; }

        /* ROW COLORS */
        .row-overdue { background-color: var(--red) !important; color: var(--dark-red) !important; } 
        .row-reserved { background-color: #b3e5fc !important; } 
        .row-partial { background-color: #fff9c4 !important; }  
        .row-active { background-color: #c8e6c9 !important; }   
        .col-orange { background-color: var(--light-orange) !important; }

        /* BUTTONS */
        .btn-up { background: var(--blue); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-reset { cursor: pointer; font-size: 18px; margin-left: 5px; color: var(--blue); background: none; border: none; }
        .btn-finish { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        /* CONSOLE */
        .console { background: #2c3e50; color: white; padding: 30px 15px; text-align: center; }
        .search-grid { display: flex; flex-direction: column; gap: 15px; max-width: 100%; margin: 0 auto; }
        @media (min-width: 768px) { .search-grid { flex-direction: row; justify-content: center; } }
        .search-box { background: white; padding: 10px; border-radius: 8px; color: black; display: flex; gap: 10px; align-items: center; }
        .btn-search { background: var(--blue); color: white; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
        @media (min-width: 768px) { .btn-search { width: auto; } }

        /* LOADING OVERLAY */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid var(--orange); border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner"></div>
    <h2 style="color: var(--primary); margin-top: 20px;">SYNCING ELITE DATA...</h2>
</div>

<div class="header-section">
    <div class="logo-row"><img src="logo.jpg" alt="ELITE" class="main-logo"></div>
    <div class="status-row">
        <div class="clock-display">
            <div id="live-date">01/01/26</div>
            <div id="live-clock" style="color: var(--orange); font-size: 20px;">00:00</div>
        </div>
        <div id="sync-status" style="font-weight: 900; color: #2ecc71;">● LIVE</div>
    </div>
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>CAR</th><th>MATRICULE</th><th>CLIENT NAME</th><th>PHONE</th><th>ID CARD N°</th><th>DRIVING LICENCE</th><th>DOCS</th>
                <th>DATE OUT</th><th>TIME OUT</th><th>DATE IN</th><th>EXT. DATE IN</th><th>TIME IN</th><th>DAYS</th><th>DAY PRICE</th>
                <th>TOTAL</th><th>ADVANCE</th><th>REMAINING</th><th>STATE</th><th>RANKING</th><th>NOTES</th><th>ACTIONS</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="console">
    <div class="search-grid">
        <div class="search-box"><input type="text" id="uSearch" placeholder="SEARCH ANY DATA..." style="border:1px solid #ccc; height:40px;"></div>
        <button class="btn-search" onclick="runHistorySearch()">SEARCH HISTORY</button>
    </div>
    <div class="table-wrapper" style="margin-top:20px;"><table id="historyTable" style="background:white; color:black;"><tbody id="resBody"></tbody></table></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyq8erfTnCltT8M2ingc3-M0ns1cpgqNv6hdYXHVs3zD2orghU_M1LL4eFeKMYkEZZCMQ/exec"; 
    let currentData = [];
    let officialTime = new Date();

    // 1. ATOMIC FAST-SYNC
    async function init() {
        const timePromise = fetch('https://worldtimeapi.org/api/timezone/Africa/Casablanca').then(r => r.json()).catch(() => null);
        const dataPromise = fetch(SCRIPT_URL).then(r => r.json());

        const [tData, dData] = await Promise.all([timePromise, dataPromise]);
        
        if(tData) officialTime = new Date(tData.datetime);
        currentData = dData;
        
        renderTable();
        document.getElementById('overlay').style.display = 'none';
        
        setInterval(() => {
            officialTime.setSeconds(officialTime.getSeconds() + 1);
            document.getElementById('live-date').innerText = formatDateStr(officialTime);
            document.getElementById('live-clock').innerText = officialTime.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'});
            processColors();
        }, 1000);
    }

    // 2. MASKING & FORMATTING
    function formatDateStr(date) {
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = String(date.getFullYear()).slice(-2);
        return `${d}/${m}/${y}`;
    }

    function parseMyDate(str) {
        if(!str || str.length < 8) return null;
        const [d, m, y] = str.split('/').map(Number);
        return new Date(2000 + y, m - 1, d);
    }

    // 3. TABLE RENDERING
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        for (let i = 1; i < currentData.length; i++) {
            const row = currentData[i];
            const tr = document.createElement('tr');
            tr.id = `row-${i}`;
            tr.innerHTML = `
                <td class="col-orange"><input value="${row[0]||''}" onchange="upd(${i},0,this.value)"></td>
                <td class="col-orange"><input value="${row[1]||''}" onchange="upd(${i},1,this.value)"></td>
                <td><input value="${row[2]||''}" onchange="upd(${i},2,this.value)"></td>
                <td><input value="${row[3]||''}" onchange="upd(${i},3,this.value)"></td>
                <td><input value="${row[4]||''}" onchange="upd(${i},4,this.value)"></td>
                <td><input value="${row[5]||''}" onchange="upd(${i},5,this.value)"></td>
                <td>
                    <button class="btn-up" onclick="document.getElementById('up-${i}').click()">UPLOAD</button>
                    <input type="file" id="up-${i}" hidden onchange="doUpload(${i}, this)">
                    ${row[6] ? `<a href="${row[6]}" target="_blank">📄</a>` : ''}
                </td>
                <td><input placeholder="dd/mm/yy" value="${row[7]||''}" onchange="upd(${i},7,this.value); calcDays(${i})"></td>
                <td><input placeholder="hh:mm" value="${row[8]||''}" onchange="upd(${i},8,this.value)"></td>
                <td><input placeholder="dd/mm/yy" value="${row[9]||''}" onchange="upd(${i},9,this.value); calcDays(${i})"></td>
                <td><input placeholder="dd/mm/yy" value="${row[10]||''}" onchange="upd(${i},10,this.value); calcDays(${i})"></td>
                <td><input placeholder="hh:mm" value="${row[11]||''}" onchange="upd(${i},11,this.value)"></td>
                <td><input value="${row[12]||''}" readonly></td>
                <td><input type="number" value="${row[13]||''}" onchange="upd(${i},13,this.value); calcMath(${i})"></td>
                <td><input value="${row[14]||''}" readonly></td>
                <td><input type="number" value="${row[15]||''}" onchange="upd(${i},15,this.value); calcMath(${i})"></td>
                <td style="display:flex; align-items:center;">
                    <input type="number" value="${row[16]||''}" onchange="upd(${i},16,this.value)">
                    <button class="btn-reset" onclick="resetRem(${i})">🔄</button>
                </td>
                <td>
                    <select onchange="upd(${i},17,this.value)">
                        <option value="" ${row[17]==''?'selected':''}>-</option>
                        <option value="ACTIVE/PAID" ${row[17]=='ACTIVE/PAID'?'selected':''}>ACTIVE/PAID</option>
                        <option value="RESERVED" ${row[17]=='RESERVED'?'selected':''}>RESERVED</option>
                        <option value="PARTIAL" ${row[17]=='PARTIAL'?'selected':''}>PARTIAL</option>
                    </select>
                </td>
                <td><select onchange="upd(${i},18,this.value)">
                    <option value="1" ${row[18]=='1'?'selected':''}>★</option>
                    <option value="2" ${row[18]=='2'?'selected':''}>★★</option>
                    <option value="3" ${row[18]=='3'?'selected':''}>★★★</option>
                    <option value="4" ${row[18]=='4'?'selected':''}>★★★★</option>
                    <option value="5" ${row[18]=='5'?'selected':''}>★★★★★</option>
                </select></td>
                <td><input value="${row[19]||''}" onchange="upd(${i},19,this.value)"></td>
                <td><button class="btn-finish" onclick="archive(${i})">FINISH</button></td>
            `;
            tbody.appendChild(tr);
        }
    }

    // 4. LOGIC: METHOD A (DAYS)
    function calcDays(i) {
        const start = parseMyDate(currentData[i][7]);
        const end = parseMyDate(currentData[i][10] || currentData[i][9]);
        if(start && end) {
            let diff = Math.floor((end - start) / (1000 * 60 * 60 * 24));
            currentData[i][12] = diff <= 0 ? 1 : diff; // Method A: Min 1 day
            calcMath(i);
        }
    }

    function calcMath(i) {
        const days = parseFloat(currentData[i][12]) || 0;
        const price = parseFloat(currentData[i][13]) || 0;
        const adv = parseFloat(currentData[i][15]) || 0;
        currentData[i][14] = days * price;
        currentData[i][16] = (days * price) - adv;
        sync();
    }

    function resetRem(i) {
        const total = parseFloat(currentData[i][14]) || 0;
        const adv = parseFloat(currentData[i][15]) || 0;
        currentData[i][16] = total - adv;
        renderTable(); 
        sync();
    }

    // 5. COLORS & OVERDUE
    function processColors() {
        for (let i = 1; i < currentData.length; i++) {
            const tr = document.getElementById(`row-${i}`);
            if(!tr) continue;
            let cls = "";
            const row = currentData[i];
            const end = parseMyDate(row[10] || row[9]);
            
            // Check Overdue
            if(end && row[2]) {
                const timePart = row[11] || "00:00";
                const [h, m] = timePart.split(':').map(Number);
                end.setHours(h, m);
                if(end < officialTime) cls = "row-overdue";
            }

            if(!cls) {
                if(row[17] === "RESERVED") cls = "row-reserved";
                else if(row[17] === "PARTIAL") cls = "row-partial";
                else if(row[17] === "ACTIVE/PAID") cls = "row-active";
            }
            if(tr.className !== cls) tr.className = cls;
        }
    }

    // 6. UPLOAD & SYNC
    async function doUpload(i, input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({
                action: "upload", row: i, filename: file.name, mimeType: file.type, base64: base64
            })});
            currentData[i][6] = await res.text();
            renderTable();
        };
        reader.readAsDataURL(file);
    }

    function upd(r, c, v) { currentData[r][c] = v; sync(); }
    async function sync() { await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "saveAll", data: currentData }) }); }

    async function archive(i) {
        if(confirm("MOVE TO HISTORY?")) {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ 
                action: "archive", row: i, data: currentData[i], officialTime: officialTime.toISOString() 
            })});
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
